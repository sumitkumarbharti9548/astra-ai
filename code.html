<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Code Editor</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --bg: #07070a;
      --card: #0f1115;
      --muted: #9aa4b2;
      --accent: #7c5cff;
      --accent-glow: rgba(124, 92, 255, 0.6);
      --glass: rgba(255, 255, 255, 0.03);
      --success: #00d9a6;
      --danger: #ff5c8d;
      --warning: #ffd166;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Poppins', system-ui, Segoe UI, Roboto, Arial;
      background: radial-gradient(900px 400px at 8% 12%, rgba(124,92,255,0.12), transparent),
                  radial-gradient(700px 350px at 92% 88%, rgba(0,180,255,0.05), transparent),
                  var(--bg);
      color: #e6eef8;
      overflow-x: hidden;
    }
    .container {
      max-width: 1400px;
      margin: 28px auto;
      padding: 72px 28px 28px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      align-items: start;
    }
    header {
      position: fixed;
      left: 20px;
      top: 18px;
      z-index: 90;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
      padding: 8px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.04);
    }
    header h1 { font-family: 'Montserrat'; font-size: 1rem; margin: 0; }

    /* Robot Panel */
    .robot-panel {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .robot-card {
      width: 100%;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
      border: 1px solid rgba(255,255,255,0.04);
      padding: 18px;
      border-radius: 16px;
      backdrop-filter: blur(6px);
    }
    .robot-stage {
      height: 340px;
      display: grid;
      place-items: center;
      position: relative;
    }
    .robot-3d {
      width: 220px;
      height: 260px;
      position: relative;
      transform-style: preserve-3d;
      animation: robotRotate 8s ease-in-out infinite;
    }
    @keyframes robotRotate {
      0%   { transform: rotateY(0)    translateY(0); }
      50%  { transform: rotateY(12deg) translateY(-8px); }
      100% { transform: rotateY(0)    translateY(0); }
    }
    .robot-shell {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 200px; height: 220px;
      border-radius: 20px;
      background: linear-gradient(180deg, var(--accent), #00b4ff);
      box-shadow: 0 20px 60px rgba(124,92,255,0.14);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 18px;
      transition: all 0.3s ease;
    }
    .robot-shell.executing {
      box-shadow: 0 0 30px var(--accent-glow);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 10px var(--accent-glow); }
      50%  { box-shadow: 0 0 30px var(--accent-glow); }
      100% { box-shadow: 0 0 10px var(--accent-glow); }
    }
    .robot-shell .visor {
      width: 120px; height: 34px;
      border-radius: 18px;
      background: rgba(255,255,255,0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .robot-shell .visor .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #071022;
      box-shadow: 0 0 14px rgba(255,255,255,0.25);
    }
    .robot-shell .chest {
      width: 140px; height: 60px;
      margin-top: 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: space-around;
      border: 1px solid rgba(255,255,255,0.03);
    }
    .robot-shadow {
      width: 160px; height: 18px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(2,6,23,0.5), transparent);
      filter: blur(6px);
      margin-top: 8px;
      opacity: 0.9;
    }

    /* Editor Panel */
    .editor-panel { display: flex; flex-direction: column; gap: 20px; }
    .editor-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 16px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      height: 600px;
    }
    .editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .editor-header h3 { margin: 0; font-family: 'Montserrat'; }
    .language-selector { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .lang-btn {
      padding: 8px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.9rem;
    }
    .lang-btn:hover { background: rgba(255,255,255,0.05); }
    .lang-btn.active {
      background: linear-gradient(90deg, var(--accent), #00b4ff);
      color: #071022;
      border-color: transparent;
    }
    .code-editor {
      flex: 1;
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      overflow: hidden;
    }
    #editor {
      width: 100%; height: 100%;
      border: none;
      padding: 16px;
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 14px;
      color: #e6eef8;
      background: transparent;
      resize: none;
      outline: none;
      line-height: 1.6;
    }

    /* Output Panel */
    .output-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 16px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      height: 300px;
    }
    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .output-header h3 { margin: 0; font-family: 'Montserrat'; }
    #output {
      flex: 1;
      padding: 16px;
      font-family: 'Fira Code', 'Courier New', monospace;
      white-space: pre-wrap;
      overflow-y: auto;
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      color: #e6eef8;
      font-size: 13px;
      line-height: 1.5;
    }
    #output iframe {
      width: 100%; height: 250px; border: none; border-radius: 6px;
    }

    /* Buttons */
    button {
      padding: 10px 16px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, var(--accent), #00b4ff);
      color: #071022;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.85rem;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.2); }
    button:active { transform: translateY(0); }
    button.secondary { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: var(--muted); }
    button.success   { background: linear-gradient(90deg, var(--success), #00c995); }
    button.warning   { background: linear-gradient(90deg, var(--warning), #ffc145); }
    button.danger    { background: linear-gradient(90deg, var(--danger),  #ff6b9d); }
    .back {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.04);
      padding: 8px 10px;
      border-radius: 10px;
      color: var(--muted);
      cursor: pointer;
    }
    .back:hover { background: rgba(255,255,255,0.05); }

    /* Status */
    .status-executing { color: var(--accent); font-weight: bold; }
    .status-success   { color: var(--success); font-weight: bold; }
    .status-error     { color: var(--danger);  font-weight: bold; }

    /* Blobs */
    .blobs { position: fixed; inset: 0; pointer-events: none; z-index: -1; }
    .blob  { position: absolute; filter: blur(44px); opacity: 0.85; border-radius: 50%; mix-blend-mode: screen; }
    .blob.b1 { width: 420px; height: 420px; left: -120px; top: -120px; background: linear-gradient(135deg, var(--accent), #2dd4bf); }
    .blob.b2 { width: 380px; height: 380px; right: -80px; bottom: -80px; background: linear-gradient(135deg, #00b4ff, #7c5cff); }
    canvas#particles { position: fixed; left: 0; top: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none; opacity: 0.12; }

    @media (max-width: 980px) {
      .container { grid-template-columns: 1fr; }
      .robot-stage { height: 240px; }
      .editor-card { height: 500px; }
    }
  </style>
</head>
<body>
  <div class="blobs" aria-hidden>
    <div class="blob b1"></div>
    <div class="blob b2"></div>
  </div>
  <canvas id="particles"></canvas>

  <header>
    <div class="logo">
      <i class="fas fa-code" style="color:var(--accent)"></i>
      <h1>AI Code Editor</h1>
    </div>
  </header>

  <div class="container">
    <aside class="robot-panel">
      <div class="robot-card">
        <div class="robot-stage">
          <div class="robot-3d" aria-hidden>
            <div class="robot-shell" id="robot-shell">
              <div class="visor"><div class="dot"></div></div>
              <div class="chest">
                <div style="width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,0.08)"></div>
                <div style="width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,0.06)"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="robot-shadow" aria-hidden></div>
      </div>
      <div style="width:100%;text-align:center;margin-top:8px">
        <strong style="color:#fff">CodeBot — AI Assistant</strong>
        <div style="color:var(--muted);font-size:0.9rem;margin-top:6px">Real-time code execution with AI assistance</div>
      </div>
    </aside>

    <main class="editor-panel" role="main">
      <div class="editor-card">
        <div class="editor-header">
          <h3>Code Editor</h3>
          <div style="display:flex;gap:8px;">
     
            <button onclick="go('index.html')"><i class="fas fa-arrow-left"></i>Home</button>
<button onclick="go('assistant.html')"><i class="fas fa-robot"></i>AI Assist</button>
          </div>
        </div>

        <div class="language-selector">
          <button class="lang-btn active" data-lang="c"><i class="fas fa-code"></i> C</button>
          <button class="lang-btn" data-lang="cpp"><i class="fas fa-code"></i> C++</button>
          <button class="lang-btn" data-lang="python"><i class="fab fa-python"></i> Python</button>
          <button class="lang-btn" data-lang="java"><i class="fab fa-java"></i> Java</button>
          <button class="lang-btn" data-lang="javascript"><i class="fab fa-js"></i> JavaScript</button>
          <button class="lang-btn" data-lang="html"><i class="fab fa-html5"></i> HTML</button>
          <button class="lang-btn" data-lang="css"><i class="fab fa-css3-alt"></i> CSS</button>
        </div>

        <div class="code-editor">
          <textarea id="editor" spellcheck="false"></textarea>
        </div>

        <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;">
          <button class="success" id="run-btn"><i class="fas fa-play"></i> Run Code</button>
          <button class="secondary" id="clear-btn"><i class="fas fa-broom"></i> Clear</button>
          <button class="warning" id="reset-btn"><i class="fas fa-redo"></i> Reset</button>
          <button class="secondary" id="copy-btn"><i class="fas fa-copy"></i> Copy</button>
        </div>
      </div>

      <div class="output-card">
        <div class="output-header">
          <h3>Output</h3>
          <button class="secondary" id="clear-output"><i class="fas fa-trash"></i> Clear</button>
        </div>
        <div id="output"></div>
      </div>
    </main>
  </div>

  <!-- Templates stored safely in JSON script tags — avoids HTML parser conflicts -->
  <script id="tpl-c" type="application/json">
  {
    "code": "#include <stdio.h>\n\nint main() {\n    printf(\"Hello, AI Code Editor!\\n\");\n    printf(\"Welcome to Programiz Pro\\n\\n\");\n\n    int n = 5, factorial = 1;\n    for(int i = 1; i <= n; i++) factorial *= i;\n    printf(\"Factorial of %d is: %d\\n\", n, factorial);\n    return 0;\n}",
    "output": "Hello, AI Code Editor!\nWelcome to Programiz Pro\n\nFactorial of 5 is: 120"
  }
  </script>
  <script id="tpl-cpp" type="application/json">
  {
    "code": "#include <iostream>\n#include <vector>\nusing namespace std;\n\nint main() {\n    cout << \"Hello, C++ Developer!\" << endl;\n    cout << \"Welcome to AI Code Editor\" << endl << endl;\n\n    vector<string> languages = {\"C++\", \"Python\", \"Java\", \"JavaScript\"};\n    cout << \"Programming Languages:\" << endl;\n    for(const auto& lang : languages)\n        cout << \"- \" << lang << endl;\n\n    int n = 6;\n    long long factorial = 1;\n    for(int i = 1; i <= n; i++) factorial *= i;\n    cout << endl << \"Factorial of \" << n << \" is: \" << factorial << endl;\n    return 0;\n}",
    "output": "Hello, C++ Developer!\nWelcome to AI Code Editor\n\nProgramming Languages:\n- C++\n- Python\n- Java\n- JavaScript\n\nFactorial of 6 is: 720"
  }
  </script>
  <script id="tpl-python" type="application/json">
  {
    "code": "# Python Example\nprint(\"Hello, Python Developer!\")\nprint(\"Welcome to AI Code Editor\\n\")\n\nnumbers = [x**2 for x in range(1, 11)]\nprint(\"Squared numbers:\", numbers)\n\nperson = {\n    \"name\": \"John Doe\",\n    \"age\": 28,\n    \"skills\": [\"Python\", \"JavaScript\", \"SQL\"]\n}\nprint(\"\\nPerson:\", person)\n\ndef calculate_factorial(n):\n    if n == 0 or n == 1:\n        return 1\n    return n * calculate_factorial(n - 1)\n\nprint(f\"\\nFactorial of 5 is: {calculate_factorial(5)}\")",
    "output": "Hello, Python Developer!\nWelcome to AI Code Editor\n\nSquared numbers: [1, 4, 9, 16, 25, 36, 49, 64, 81, 100]\n\nPerson: {'name': 'John Doe', 'age': 28, 'skills': ['Python', 'JavaScript', 'SQL']}\n\nFactorial of 5 is: 120"
  }
  </script>
  <script id="tpl-java" type="application/json">
  {
    "code": "// Java Example\nimport java.util.Arrays;\n\npublic class Main {\n    public static void main(String[] args) {\n        System.out.println(\"Hello, Java Developer!\");\n        System.out.println(\"Welcome to AI Code Editor\\n\");\n\n        int[] numbers = {12, 45, 23, 67, 34, 89, 56};\n        int sum = 0;\n        for(int num : numbers) sum += num;\n\n        System.out.println(\"Array: \" + Arrays.toString(numbers));\n        System.out.println(\"Sum: \" + sum);\n        System.out.println(\"Average: \" + (double)sum / numbers.length);\n        System.out.println(\"\\nFactorial of 5 is: \" + calculateFactorial(5));\n    }\n\n    public static int calculateFactorial(int n) {\n        if (n == 0 || n == 1) return 1;\n        return n * calculateFactorial(n - 1);\n    }\n}",
    "output": "Hello, Java Developer!\nWelcome to AI Code Editor\n\nArray: [12, 45, 23, 67, 34, 89, 56]\nSum: 326\nAverage: 46.57142857142857\n\nFactorial of 5 is: 120"
  }
  </script>
  <script id="tpl-javascript" type="application/json">
  {
    "code": "// JavaScript Example\nconsole.log(\"Hello, JavaScript Developer!\");\nconsole.log(\"Welcome to AI Code Editor\\n\");\n\nconst fruits = ['Apple', 'Banana', 'Orange', 'Mango'];\nconsole.log('Fruits:', fruits.join(', '));\n\nconst user = {\n    name: 'John Doe',\n    age: 28,\n    profession: 'Developer',\n    skills: ['JavaScript', 'Python', 'React']\n};\nconsole.log('\\nUser Name:', user.name);\nconsole.log('Skills:', user.skills.join(', '));\n\nfunction factorial(n) {\n    if (n === 0 || n === 1) return 1;\n    return n * factorial(n - 1);\n}\nconsole.log('\\nFactorial of 5 is:', factorial(5));",
    "output": ""
  }
  </script>
  <script id="tpl-html" type="application/json">
  {
    "code": "<!DOCTYPE html>\n<html>\n<head>\n  <style>\n    body {\n      font-family: 'Segoe UI', sans-serif;\n      background: linear-gradient(135deg, #1a1d23, #2d3041);\n      color: white;\n      text-align: center;\n      padding: 40px;\n    }\n    h1 { font-size: 2.5rem; color: #7c5cff; margin-bottom: 16px; }\n    .box {\n      background: rgba(255,255,255,0.08);\n      padding: 2rem;\n      border-radius: 15px;\n      max-width: 500px;\n      margin: 0 auto;\n    }\n    button {\n      margin-top: 12px;\n      padding: 10px 24px;\n      background: #7c5cff;\n      color: white;\n      border: none;\n      border-radius: 8px;\n      cursor: pointer;\n      font-size: 1rem;\n    }\n  </style>\n</head>\n<body>\n  <div class=\"box\">\n    <h1>Hello, AI Editor!</h1>\n    <p>Welcome to the HTML preview pane.</p>\n    <button onclick=\"alert('Hello from HTML!')\">Click Me</button>\n  </div>\n</body>\n</html>",
    "output": ""
  }
  </script>
  <script id="tpl-css" type="application/json">
  {
    "code": "/* CSS Example — preview rendered below */\n\n.box {\n  background: linear-gradient(135deg, #7c5cff, #00b4ff);\n  border-radius: 15px;\n  padding: 2rem;\n  color: white;\n  max-width: 420px;\n  margin: 2rem auto;\n  box-shadow: 0 10px 30px rgba(0,0,0,0.3);\n  text-align: center;\n  font-family: 'Segoe UI', sans-serif;\n}\n\n.box h2 {\n  font-size: 1.8rem;\n  margin-bottom: 0.8rem;\n}\n\n.btn {\n  background: rgba(255,255,255,0.2);\n  border: none;\n  padding: 0.7rem 1.4rem;\n  border-radius: 25px;\n  color: white;\n  cursor: pointer;\n  margin-top: 1rem;\n  font-weight: 600;\n  transition: all 0.3s ease;\n}\n\n.btn:hover {\n  background: rgba(255,255,255,0.35);\n  transform: translateY(-2px);\n}",
    "output": ""
  }
  </script>

  <script>
    // ── Particles ──────────────────────────────────────────────
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
    addEventListener('resize', resize);
    resize();
    const particles = Array.from({length: 90}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.6 + 0.4,
      vx: (Math.random() - 0.5) * 0.25,
      vy: (Math.random() - 0.5) * 0.25
    }));
    function tick() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const p of particles) {
        p.x = (p.x + p.vx + canvas.width) % canvas.width;
        p.y = (p.y + p.vy + canvas.height) % canvas.height;
        ctx.beginPath();
        ctx.fillStyle = 'rgba(180,200,255,0.6)';
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      requestAnimationFrame(tick);
    }
    tick();

    // ── Load templates from JSON script tags (safe from HTML parser) ──
    function loadTemplate(id) {
      const el = document.getElementById('tpl-' + id);
      return el ? JSON.parse(el.textContent) : { code: '', output: '' };
    }
    const templates = {
      c:          loadTemplate('c'),
      cpp:        loadTemplate('cpp'),
      python:     loadTemplate('python'),
      java:       loadTemplate('java'),
      javascript: loadTemplate('javascript'),
      html:       loadTemplate('html'),
      css:        loadTemplate('css')
    };

    // ── DOM refs ──────────────────────────────────────────────
    const editor        = document.getElementById('editor');
    const output        = document.getElementById('output');
    const runBtn        = document.getElementById('run-btn');
    const clearBtn      = document.getElementById('clear-btn');
    const resetBtn      = document.getElementById('reset-btn');
    const copyBtn       = document.getElementById('copy-btn');
    const clearOutputBtn= document.getElementById('clear-output');
    const themeBtn      = document.getElementById('theme-btn');
    const aiAssistBtn   = document.getElementById('ai-assist');
    const robotShell    = document.getElementById('robot-shell');
    const langButtons   = document.querySelectorAll('.lang-btn');

    let currentLanguage = 'c';
    editor.value = templates.c.code;

    // ── Language switcher ─────────────────────────────────────
    langButtons.forEach(btn => {
      btn.addEventListener('click', function () {
        langButtons.forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentLanguage = this.getAttribute('data-lang');
        editor.value = templates[currentLanguage].code;
        output.innerHTML = '';
      });
    });

    // ── Run Code ──────────────────────────────────────────────
    function runCode() {
      const code = editor.value.trim();
      if (!code) {
        output.innerHTML = '<span class="status-error"><i class="fas fa-exclamation-circle"></i> No code to run!</span>';
        return;
      }

      output.innerHTML = '<span class="status-executing"><i class="fas fa-cog fa-spin"></i> Executing code...</span>';
      robotShell.classList.add('executing');

      setTimeout(() => {
        try {
          if (currentLanguage === 'html') {
            // Render HTML in an iframe
            output.innerHTML = '';
            const iframe = document.createElement('iframe');
            output.appendChild(iframe);
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            doc.open();
            doc.write(code);
            doc.close();

          } else if (currentLanguage === 'javascript') {
            // Execute JS and capture console.log
            const logs = [];
            const origLog = console.log;
            console.log = (...args) => {
              logs.push(args.map(a =>
                typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)
              ).join(' '));
              origLog.apply(console, args);
            };
            try {
              // eslint-disable-next-line no-eval
              eval(code);
            } finally {
              console.log = origLog;
            }
            output.innerHTML =
              '<span class="status-success"><i class="fas fa-check-circle"></i> Executed successfully!</span>\n\n' +
              escapeHtml(logs.join('\n') || '(no output)');

          } else if (currentLanguage === 'css') {
            // Render CSS preview
            output.innerHTML = '';
            const iframe = document.createElement('iframe');
            output.appendChild(iframe);
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            doc.open();
            doc.write(
              '<!DOCTYPE html><html><head><style>' + code +
              '</style></head><body style="margin:0;background:#0d0d12;">' +
              '<div class="box"><h2>CSS Preview</h2><p>Hover over the button below.</p>' +
              '<button class="btn">Hover Me</button></div></body></html>'
            );
            doc.close();

          } else {
            // Simulated output for C, C++, Python, Java
            const tplOut = templates[currentLanguage].output;
            output.innerHTML =
              '<span class="status-success"><i class="fas fa-check-circle"></i> Code executed successfully!</span>\n\n' +
              escapeHtml(tplOut);
          }
        } catch (err) {
          output.innerHTML =
            '<span class="status-error"><i class="fas fa-exclamation-circle"></i> Error: ' +
            escapeHtml(err.message) + '</span>';
        }
        robotShell.classList.remove('executing');
      }, 1200);
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    // ── Editor utilities ──────────────────────────────────────
    function clearEditor()  { editor.value = ''; }
    function resetEditor()  { editor.value = templates[currentLanguage].code; output.innerHTML = ''; }
    function clearOutput()  { output.innerHTML = ''; }

    function copyCode() {
      navigator.clipboard.writeText(editor.value).then(() => {
        const orig = copyBtn.innerHTML;
        copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
        setTimeout(() => { copyBtn.innerHTML = orig; }, 2000);
      });
    }

    function aiAssist() {
      output.innerHTML = '<span class="status-executing"><i class="fas fa-robot fa-spin"></i> AI is analysing your code...</span>';
      setTimeout(() => {
        const tips = [
          "Consider adding error handling for edge cases.",
          "Your code structure looks solid — try adding inline comments.",
          "Optimise your loops: precompute constants outside the loop body.",
          "Use more descriptive variable names for better readability.",
          "Break long functions into smaller, focused helper functions."
        ];
        const tip = tips[Math.floor(Math.random() * tips.length)];
        output.innerHTML =
          '<span class="status-success"><i class="fas fa-lightbulb"></i> AI Suggestion:</span>\n\n' +
          tip + '\n\n<span style="color:var(--muted);font-size:0.85em">AI is continuously learning from your coding patterns.</span>';
      }, 2000);
    }

    // ── Event listeners ────────────────────────────────────────
    runBtn.addEventListener('click', runCode);
    clearBtn.addEventListener('click', clearEditor);
    resetBtn.addEventListener('click', resetEditor);
    copyBtn.addEventListener('click', copyCode);
    clearOutputBtn.addEventListener('click', clearOutput);
    aiAssistBtn.addEventListener('click', aiAssist);
    themeBtn.addEventListener('click', () => {
      output.innerHTML = '<span class="status-executing">🎨 Theme customisation coming soon!</span>';
    });

    // Robot bounce on output change
    const observer = new MutationObserver(() => {
      robotShell.animate([
        { transform: 'translate(-50%,-50%) translateY(0)' },
        { transform: 'translate(-50%,-50%) translateY(-8px)' },
        { transform: 'translate(-50%,-50%) translateY(0)' }
      ], { duration: 500, iterations: 1 });
    });
    observer.observe(output, { childList: true, subtree: false });

    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      document.querySelectorAll('.robot-3d').forEach(r => r.style.animation = 'none');
      document.querySelectorAll('.blob').forEach(b => b.style.animation = 'none');
    }
  </script>
</body>
</html>
